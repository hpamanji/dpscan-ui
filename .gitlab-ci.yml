image: node:22

stages:
  - verify
  - build

.node-cache: &node-cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

.install: &install
  before_script:
    - npm ci

lint:
  stage: verify
  <<: *node-cache
  <<: *install
  script:
    - npm run lint

typecheck:
  stage: verify
  <<: *node-cache
  <<: *install
  script:
    - npx tsc -b --noEmit

# Single Pages job — publishes the default branch at /<project>/
# and every other branch/MR at /<project>/<prefix>/.
# VITE_NEXUS_BASE_URL and VITE_NEXUS_REPO come from
# Settings -> CI/CD -> Variables (set as Protected, not Masked).
pages:
  stage: build
  <<: *node-cache
  <<: *install
  script:
    - npm run build
    - mv dist public
  pages:
    path_prefix: "$PAGES_PREFIX"
    expire_in: 1 week
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        PAGES_PREFIX: ""
        VITE_BASE_PATH: "/$CI_PROJECT_NAME/"
    - if: $CI_MERGE_REQUEST_IID
      variables:
        PAGES_PREFIX: "mr-$CI_MERGE_REQUEST_IID"
        VITE_BASE_PATH: "/$CI_PROJECT_NAME/mr-$CI_MERGE_REQUEST_IID/"
    - if: $CI_COMMIT_BRANCH
      variables:
        PAGES_PREFIX: "$CI_COMMIT_REF_SLUG"
        VITE_BASE_PATH: "/$CI_PROJECT_NAME/$CI_COMMIT_REF_SLUG/"
